<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grok Register Console</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body data-page="controller">
  <div id="app" class="shell">
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand brand-link" href="/">
          <span class="brand-title">Auto Register</span>
        </a>
        <nav class="main-nav" aria-label="主导航">
          <a class="nav-link{% if active_page == "controller" %} active{% endif %}" href="/">运行控制</a>
          <a class="nav-link{% if active_page == "settings" %} active{% endif %}" href="/settings">系统配置</a>
        </nav>
        <div class="topbar-actions"></div>
      </div>
    </header>

    <main class="main">
      <section class="workspace workspace-controller">
        <section class="panel panel-controller-side">
          <div class="panel-head panel-head-stack">
            <div>
              <div class="eyebrow">Controller</div>
              <h2>自动补号</h2>
            </div>
            <div class="button-row controller-action-row">
              <button id="masterToggleBtn" class="button" type="button">开始</button>
              <button id="manualCheckBtn" class="button button-secondary" type="button">检测</button>
              <button id="toggleControllerSettingsBtn" class="button button-secondary" type="button">设置</button>
            </div>
          </div>

          <div id="controllerMessage" class="form-message"></div>
          <div id="controllerSummary" class="summary-grid summary-grid-compact"></div>
        </section>

        <section class="panel panel-detail panel-log-card">
          <div class="panel-head panel-head-compact">
            <div>
              <div class="eyebrow">Live Console</div>
              <h2>控制台</h2>
            </div>
            <button id="consoleLockBtn" class="button button-secondary button-sm" type="button">锁定</button>
          </div>
          <div class="console-wrap">
            <pre id="consoleOutput" class="console-output">等待控制器输出</pre>
          </div>
        </section>
      </section>

      <div id="controllerSettingsModal" class="modal hidden" hidden>
        <div id="controllerSettingsBackdrop" class="modal-backdrop"></div>
        <div class="modal-dialog modal-dialog-controller">
          <button id="closeControllerSettingsBtn" class="modal-close" type="button" aria-label="关闭">&times;</button>
          <div class="panel-head modal-head">
            <div>
              <div class="eyebrow">Controller Settings</div>
              <h2>控制器设置</h2>
              <p class="panel-desc">调整自动补号、并发数和启停阈值，这些配置会直接影响当前控制器策略。</p>
            </div>
          </div>
          <form id="controllerSettingsForm" class="modal-form">
            <label class="toggle-row">
              <span class="toggle-label">开启自动补号</span>
              <span class="toggle-wrap">
                <input name="auto_refill_enabled" type="checkbox" class="toggle-input">
                <span class="toggle-track"></span>
              </span>
            </label>
            <div class="modal-fields">
              <label class="modal-field">
                <span>并发数</span>
                <small>同时运行的 worker 数量</small>
                <input name="concurrency" type="number" min="1" max="32">
              </label>
              <label class="modal-field">
                <span>单次补号数</span>
                <small>不开自动时每次补多少个</small>
                <input name="single_batch_count" type="number" min="1">
              </label>
            </div>
            <div class="modal-fields">
              <label class="modal-field">
                <span>启动阈值</span>
                <small>低于此值自动开始补号</small>
                <input name="start_threshold" type="number" min="0">
              </label>
              <label class="modal-field">
                <span>停止阈值</span>
                <small>达到此值自动停止补号</small>
                <input name="stop_threshold" type="number" min="1">
              </label>
            </div>
            <div class="modal-actions">
              <button class="button" type="submit">保存控制设置</button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script>
    window.__DEFAULTS__ = {{ defaults|safe }};
  </script>
  <script src="/static/app.js"></script>
</body>
</html>
