services:
  # 内置 grok2api 已移除：请自行部署，并在 .env 中配置 API endpoint/token。

  warp:
    image: caomingjun/warp:latest
    restart: unless-stopped
    environment:
      WARP_SLEEP: 2
    cap_add:
      - NET_ADMIN
    ports:
      - "127.0.0.1:1080:1080"

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    restart: unless-stopped
    environment:
      LOG_LEVEL: info
      LOG_HTML: "false"
      CAPTCHA_SOLVER: none

  console:
    build:
      context: .
      dockerfile: apps/worker-runtime/Dockerfile
    working_dir: /workspace
    command: python /workspace/apps/console/app.py
    environment:
      GROK_REGISTER_SOURCE_DIR: /workspace
      GROK_REGISTER_PYTHON: /usr/local/bin/python
      GROK_REGISTER_CONSOLE_HOST: 0.0.0.0
      GROK_REGISTER_CONSOLE_PORT: ${GROK_STACK_CONSOLE_PORT:-18600}
      GROK_REGISTER_CONSOLE_MAX_CONCURRENT_TASKS: 1
      GROK_REGISTER_DEFAULT_RUN_COUNT: ${GROK_REGISTER_DEFAULT_RUN_COUNT:-50}
      GROK_REGISTER_DEFAULT_PROXY: ${GROK_REGISTER_DEFAULT_PROXY:-socks5://warp:1080}
      GROK_REGISTER_DEFAULT_BROWSER_PROXY: ${GROK_REGISTER_DEFAULT_BROWSER_PROXY:-socks5://warp:1080}
      GROK_REGISTER_DEFAULT_API_ENDPOINT: ${GROK_REGISTER_DEFAULT_API_ENDPOINT:-http://host.docker.internal:8000/v1/admin/tokens}
      GROK_REGISTER_DEFAULT_API_TOKEN: ${GROK_REGISTER_DEFAULT_API_TOKEN:-change-this-admin-password}
      GROK_REGISTER_DEFAULT_API_APPEND: ${GROK_REGISTER_DEFAULT_API_APPEND:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${GROK_STACK_CONSOLE_PORT:-18600}:18600"
    volumes:
      - .:/workspace
    restart: unless-stopped
    depends_on:
      - warp
      - flaresolverr
